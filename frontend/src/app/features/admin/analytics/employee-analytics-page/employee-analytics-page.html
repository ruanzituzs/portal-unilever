<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
  <!-- Loading State -->
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
  </div>

  <!-- Analytics Content -->
  <div *ngIf="!loading && analytics" class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button (click)="goBack()" class="p-2 rounded-full hover:bg-gray-200 transition-colors">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </button>
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Análise de Desempenho</h1>
          <p class="text-gray-500 mt-1">Colaborador: <span class="font-semibold text-gray-700">{{ analytics.name }}</span> ({{ analytics.department }})</p>
        </div>
      </div>
      <div class="flex gap-4">
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100 text-center">
          <p class="text-xs text-gray-500 uppercase font-semibold">Nível</p>
          <p class="text-xl font-bold text-indigo-600">{{ analytics.level }}</p>
        </div>
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100 text-center">
          <p class="text-xs text-gray-500 uppercase font-semibold">XP Total</p>
          <p class="text-xl font-bold text-indigo-600">{{ analytics.xp }}</p>
        </div>
      </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- Radar Chart (Performance Categories) -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Desempenho por Categoria</h3>
        <div class="h-80 flex justify-center">
          <canvas baseChart
            [data]="radarChartData"
            [options]="radarChartOptions"
            [type]="radarChartType">
          </canvas>
        </div>
      </div>

      <!-- Line Chart (Progress Over Time) -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Evolução do Conhecimento</h3>
        <div class="h-80 flex justify-center">
          <canvas baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            [type]="lineChartType">
          </canvas>
        </div>
      </div>

      <!-- Bar Chart (Accuracy by Difficulty) -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Precisão por Dificuldade</h3>
        <div class="h-80 flex justify-center">
          <canvas baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="barChartType">
          </canvas>
        </div>
      </div>

      <!-- Gauge/Doughnut Chart (Speed vs Team) -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Índice de Velocidade</h3>
        <div class="h-80 flex justify-center relative">
          <canvas baseChart
            [data]="speedChartData"
            [options]="speedChartOptions"
            [type]="speedChartType">
          </canvas>
          <!-- Center Text for Doughnut -->
          <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-6">
            <span class="text-3xl font-bold text-gray-900">{{ analytics.speedIndex }}s</span>
            <span class="text-sm text-gray-500">Média</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
